{% extends "base.html" %}

{% block content %}
<section class="card bg-base-100 shadow">
    <div class="card-body">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-4">
            <h2 class="card-title">Completed Jobs</h2>
            <button class="btn btn-outline btn-sm"
                hx-get="{{ url_for('queue.results_table') }}"
                hx-target="#results-table"
                hx-swap="outerHTML">
                Refresh
            </button>
        </div>
        <div id="results-table"
            hx-get="{{ url_for('queue.results_table') }}"
            hx-trigger="load, every 7s"
            hx-target="#results-table"
            hx-swap="outerHTML">
            {% include "partials/results_table.html" with context %}
        </div>
    </div>
</section>
{% endblock %}

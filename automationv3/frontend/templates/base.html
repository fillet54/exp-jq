<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title or "AutomationV3" }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.2/dist/full.css" rel="stylesheet" type="text/css" />
    <script src="https://unpkg.com/htmx.org@1.9.9"></script>
    <script src="https://unpkg.com/htmx.org@1.9.9/dist/ext/sse.js"></script>
    <style>
        /* Local fallback styles for rendered RST content without Tailwind Typography plugin. */
        .rendered-rst {
            font-size: 0.95rem;
            line-height: 1.55;
        }
        .rendered-rst h1,
        .rendered-rst h2,
        .rendered-rst h3,
        .rendered-rst h4 {
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            line-height: 1.25;
        }
        .rendered-rst h1 { font-size: 1.5rem; }
        .rendered-rst h2 { font-size: 1.25rem; }
        .rendered-rst h3 { font-size: 1.05rem; }
        .rendered-rst p {
            margin: 0.45rem 0;
        }
        .rendered-rst ul,
        .rendered-rst ol {
            margin: 0.4rem 0 0.6rem 1.1rem;
        }
        .rendered-rst li {
            margin: 0.2rem 0;
        }
        .rendered-rst pre {
            margin: 0.6rem 0;
            padding: 0.75rem;
            border-radius: 0.4rem;
            overflow-x: auto;
            background: color-mix(in oklab, var(--b2), #000 4%);
            font-size: 0.8rem;
        }
        .rendered-rst .rvt-block {
            margin: 0.7rem 0;
            padding: 0.45rem 0.55rem;
            border: 1px solid #bfdbfe;
            border-left: 4px solid #3b82f6;
            border-radius: 0.5rem;
            background: #eff6ff;
        }
        .rendered-rst .rvt-block pre {
            margin: 0;
            border-radius: 0.35rem;
            background: #f8fafc;
        }
        .rendered-rst .rvt-block.rvt-block-error {
            border-color: #f59e0b;
            border-left-color: #b45309;
            background: #fffbeb;
        }
        .rendered-rst .rvt-block.rvt-block-error pre {
            background: #fffbeb;
        }
        .rendered-rst .rvt-result-block {
            border-left-width: 5px;
        }
        .rendered-rst .rvt-result-block.rvt-result-pass {
            border-color: #86efac;
            border-left-color: #16a34a;
            background: #f0fdf4;
        }
        .rendered-rst .rvt-result-block.rvt-result-fail {
            border-color: #fca5a5;
            border-left-color: #dc2626;
            background: #fef2f2;
        }
        .rendered-rst .rvt-result-block pre {
            margin-top: 0.25rem;
        }
        .rendered-rst code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 0.84em;
        }
        .rendered-rst pre code {
            font-size: inherit;
        }
        .raw-source-table :where(td, th) {
            padding-top: 0.05rem !important;
            padding-bottom: 0.05rem !important;
            padding-left: 0.35rem;
            padding-right: 0.35rem;
            line-height: 1.05;
            vertical-align: top;
        }
        .raw-source-table .raw-source-line {
            display: block;
            white-space: pre;
            line-height: 1.05;
        }
        .raw-source-table .badge {
            min-height: 1rem;
            height: 1rem;
            line-height: 1rem;
        }
        .dir-tree {
            font-size: 0.82rem;
            line-height: 1.15;
        }
        .dir-tree-root,
        .dir-tree-children {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .dir-tree-children {
            margin-left: 0.35rem;
            padding-left: 0.35rem;
            border-left: 1px solid color-mix(in oklab, var(--bc), transparent 86%);
        }
        .dir-tree-item {
            margin: 0.04rem 0;
        }
        .dir-tree-node > .dir-tree-summary {
            list-style: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
        }
        .dir-tree-node > .dir-tree-summary::-webkit-details-marker {
            display: none;
        }
        .dir-tree-node > .dir-tree-summary::before {
            content: "▸";
            display: inline-block;
            width: 0.7rem;
            margin-right: 0.08rem;
            font-size: 0.72rem;
            opacity: 0.7;
            line-height: 1;
            flex: 0 0 0.7rem;
        }
        .dir-tree-node[open] > .dir-tree-summary::before {
            transform: rotate(90deg);
        }
        .dir-tree-link {
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.45rem;
            min-width: 0;
            width: 100%;
            padding: 0.14rem 0.38rem;
            border-radius: 0.34rem;
            text-decoration: none;
        }
        .dir-tree-label {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .dir-tree-link.active {
            background: color-mix(in oklab, var(--p), white 86%);
            color: var(--pc);
            font-weight: 600;
        }
        .dir-tree-leaf {
            margin-left: 0.78rem;
            width: calc(100% - 0.78rem);
        }
    </style>
</head>
<body class="min-h-screen bg-base-200 text-base-content">
    <div class="navbar bg-base-100 shadow-md mb-6">
        <div class="navbar-start px-4">
            <a class="text-xl font-bold" href="{{ url_for('queue.queue_page') }}">AutomationV3</a>
        </div>
        <div class="navbar-center hidden lg:flex">
            <ul class="menu menu-horizontal px-1 gap-1">
                <li><a href="{{ url_for('queue.queue_page') }}">Queue</a></li>
                <li><a href="{{ url_for('queue.workers_page') }}">Workers</a></li>
                <li><a href="{{ url_for('reports.reports_page') }}">Reports</a></li>
                <li><a href="{{ url_for('scripts.scripts_panel') }}">Scripts</a></li>
            </ul>
        </div>
        <div class="navbar-end px-4">
            <a class="btn btn-ghost btn-sm" href="{{ url_for('system.docs_index') }}">Docs</a>
            <a class="btn btn-ghost btn-sm" href="{{ url_for('system.health') }}">Health</a>
        </div>
    </div>
    <main class="container mx-auto px-4 pb-10">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>

{% extends "base.html" %}

{% block content %}
<section class="card bg-base-100 shadow">
    <div class="card-body">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-3">
            <div>
                <h2 class="card-title font-mono text-base">{{ script_relpath }}</h2>
            </div>
            <div class="flex items-center gap-2">
                <a class="btn btn-outline btn-sm" href="{{ url_for('scripts_panel', base_path=base_path) }}">Back to Scripts</a>
                <div class="join">
                    <a class="btn btn-sm join-item {% if view_mode == 'render' %}btn-primary{% else %}btn-outline{% endif %}"
                       href="{{ url_for('script_detail_page', script_relpath=script_relpath, base_path=base_path, view='render') }}">
                        Rendered
                    </a>
                    <a class="btn btn-sm join-item {% if view_mode == 'raw' %}btn-primary{% else %}btn-outline{% endif %}"
                       href="{{ url_for('script_detail_page', script_relpath=script_relpath, base_path=base_path, view='raw') }}">
                        Raw Source
                    </a>
                </div>
            </div>
        </div>

        {% if view_mode == "raw" %}
            <pre class="bg-base-200 p-4 rounded text-xs overflow-auto"><code>{{ script_content }}</code></pre>
        {% else %}
            <article class="rendered-rst">
                {{ rendered_html|safe }}
            </article>
        {% endif %}
    </div>
</section>
{% endblock %}
